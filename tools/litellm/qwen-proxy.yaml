# LiteLLM proxy: exposes an Anthropic /v1/messages endpoint backed by local Ollama (qwen3.6).
# Used by claude-mem (provider=claude, ANTHROPIC_BASE_URL -> this proxy) to generate
# observations locally with zero rate limits and zero cloud cost.
# Requires Ollama running locally with the qwen3.6 model pulled (see README).
model_list:
  - model_name: "*"            # accept any incoming model name (claude-mem sends haiku/etc.)
    litellm_params:
      model: ollama_chat/qwen3.6:latest
      api_base: http://127.0.0.1:11434
      think: false             # disable qwen3.6 thinking for fast, clean summaries

litellm_settings:
  drop_params: true            # silently drop params the ollama backend doesn't accept
