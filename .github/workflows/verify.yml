name: verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck
      - name: Run isolated workflow tests
        run: |
          bash tools/codex/test-workflow.sh
          bash tools/model-team/test-model-team.sh
          bash tools/opencode/test-workflow.sh
      - name: Validate scripts and configuration
        run: |
          bash -n init.sh tools/update-versions.sh tools/**/*.sh
          shellcheck -x init.sh tools/headroom/headroom-canary \
            tools/update-versions.sh \
            tools/model-team/doctor-model-team.sh tools/model-team/model-team-watch \
            tools/model-team/test-model-team.sh tools/opencode/doctor-workflow.sh \
            tools/opencode/install-opencode.sh tools/opencode/test-workflow.sh
          python3 -m py_compile tools/model-team/codex-worker-mcp tools/model-team/mcp-smoke.py tools/opencode/claude-worker-mcp tools/opencode/mcp-smoke.py
          jq empty claude/settings.json claude/settings.local.json opencode/opencode.json
          python3 - <<'PY'
          from pathlib import Path
          import tomllib
          for path in Path('.').rglob('*.toml'):
              tomllib.loads(path.read_text())
          PY
          git diff --check
